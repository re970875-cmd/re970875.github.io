<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selbsthilfegruppe Frankfurt</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a5f;
      --primary-light: #2d5a8c;
      --primary-dark: #0f2438;
      --accent: #4a90e2;
      --accent-light: #6ba3f5;
      --text-dark: #1a202c;
      --text-muted: #64748b;
      --bg-light: #f8fafc;
      --bg-white: #ffffff;
      --border: #e2e8f0;
      --shadow-sm: 0 2px 8px rgba(30, 58, 95, 0.08);
      --shadow-md: 0 4px 16px rgba(30, 58, 95, 0.12);
      --shadow-lg: 0 12px 32px rgba(30, 58, 95, 0.15);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'IBM Plex Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--bg-light) 0%, #f0f4fa 100%);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      word-spacing: 0.05em;
      letter-spacing: 0.3px;
    }

    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      padding: 32px 20px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #headerImage {
      max-height: 90px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      display: none;
      border: 3px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease;
    }

    #headerImage:hover {
      transform: scale(1.05);
    }

    #title {
      font-weight: 700;
      font-size: 2rem;
      line-height: 1.2;
      text-align: center;
      letter-spacing: 0.5px;
      word-spacing: 0.15em;
    }

    nav {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 24px 20px;
      background: var(--bg-white);
      flex-wrap: wrap;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav button {
      padding: 12px 16px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg-white);
      color: var(--text-dark);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 100px;
    }

    nav button .icon {
      font-size: 1.8rem;
      line-height: 1;
      display: block;
    }

    nav button .label {
      font-size: 0.85rem;
      display: block;
      width: 100%;
      text-align: center;
    }

    nav button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(74, 144, 226, 0.1), transparent);
      transition: left 0.5s ease;
    }

    nav button:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
      transform: translateY(-2px);
    }

    nav button:hover::before {
      left: 100%;
    }

    nav button.active {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
    }

    main {
      flex: 1;
      padding: 32px 20px;
      max-width: 750px;
      margin: 0 auto;
      width: 100%;
    }

    #content {
      padding: 32px;
      background: var(--bg-white);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      line-height: 1.7;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #content p {
      color: var(--text-dark);
      font-size: 1rem;
      margin-bottom: 1.2rem;
      line-height: 1.7;
      word-spacing: 0.02em;
      letter-spacing: 0.3px;
    }

    #content p:last-child {
      margin-bottom: 0;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-top: 20px;
      display: block;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      transition: transform 0.3s ease;
    }

    img:hover {
      transform: scale(1.02);
    }

    footer {
      background: var(--primary-dark);
      color: rgba(255, 255, 255, 0.8);
      padding: 32px 20px;
      text-align: center;
      font-size: 0.9rem;
      margin-top: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      word-spacing: 0.12em;
    }

    footer a {
      color: var(--accent-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: white;
    }

    @media (max-width: 768px) {
      #title {
        font-size: 1.5rem;
      }

      header {
        padding: 24px 16px;
        gap: 16px;
      }

      nav {
        padding: 12px;
        gap: 6px;
      }

      nav button {
        padding: 10px 12px;
        font-size: 0.8rem;
        min-width: 90px;
      }

      nav button .icon {
        font-size: 1.5rem;
      }

      main {
        padding: 20px 16px;
      }

      #content {
        padding: 20px;
      }

      #headerImage {
        max-height: 70px;
      }
    }

    @media (max-width: 480px) {
      #title {
        font-size: 1.25rem;
      }

      header {
        padding: 16px;
      }

      #headerImage {
        max-height: 60px;
      }

      nav {
        padding: 8px;
        gap: 4px;
      }

      nav button {
        padding: 8px 10px;
        font-size: 0.75rem;
        min-width: 80px;
      }

      nav button .icon {
        font-size: 1.3rem;
      }

      #content {
        padding: 16px;
      }

      #content p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <img id="headerImage" src="" alt="Logo">
    <h1 id="title"></h1>
  </div>
</header>

<nav id="menu"></nav>

<main>
  <div id="content"></div>
</main>

<footer id="impressum"></footer>

<script>
fetch('content_updated.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('title').innerText = data.title;

    if(data.headerImage){
      const img = document.getElementById('headerImage');
      img.src = data.headerImage;
      img.style.display = 'block';
    }

    document.getElementById('impressum').innerHTML = '<p>' + data.impressum.replace(/\n/g, '<br>') + '</p>';

    const menu = document.getElementById('menu');
    let currentButton = null;

    data.tabs.forEach((tab, index) => {
      const btn = document.createElement('button');
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.innerText = tab.icon || '📄';
      
      const label = document.createElement('span');
      label.className = 'label';
      label.innerText = tab.title;
      
      btn.appendChild(icon);
      btn.appendChild(label);
      
      btn.onclick = () => {
        if(currentButton) currentButton.classList.remove('active');
        btn.classList.add('active');
        currentButton = btn;
        showTab(tab);
      };
      menu.appendChild(btn);

      if(index === 0) {
        btn.classList.add('active');
        currentButton = btn;
        showTab(tab);
      }
    });

    function showTab(tab) {
      const content = document.getElementById('content');
      content.innerHTML = '';

      if(tab.text) {
        const textContainer = document.createElement('div');
        tab.text.split('\n\n').forEach(paragraph => {
          const p = document.createElement('p');
          p.innerText = paragraph;
          textContainer.appendChild(p);
        });
        content.appendChild(textContainer);
      }

      if(tab.images){
        tab.images.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = tab.title;
          content.appendChild(img);
        });
      }
    }
  });
</script>

</body>
</html>
